<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WANTED | Marketplace</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --amarillo: #FFD700;
            --negro-puro: #0a0a0a;
            --negro-card: #161616;
            --gris-texto: #a0a0a0;
            --blanco: #ffffff;
        }

        body { 
            background-color: var(--negro-puro); 
            color: var(--blanco); 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Header Profesional */
        header {
            width: 100%;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
            border-bottom: 1px solid #222;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .brand-name {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -1px;
            color: var(--amarillo);
            text-transform: uppercase;
        }

        .logo-w {
            background-color: var(--amarillo);
            color: #000;
            font-weight: 900;
            font-size: 1.5rem;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            font-style: italic;
        }

        .main-container {
            width: 95%;
            max-width: 480px;
            margin: 40px 0;
            background: var(--negro-card);
            padding: 40px;
            border-radius: 16px;
            border: 1px solid #222;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .descripcion {
            font-size: 1rem;
            color: var(--gris-texto);
            margin-bottom: 30px;
            line-height: 1.6;
            text-align: center;
        }

        .precio-wrapper {
            text-align: center;
            margin-bottom: 40px;
        }

        .precio-label {
            display: block;
            font-size: 0.8rem;
            color: var(--amarillo);
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        .precio-us {
            font-size: 3.5rem;
            font-weight: 700;
            color: var(--blanco);
        }

        .precio-us span {
            font-size: 1.5rem;
            color: var(--gris-texto);
            margin-right: 10px;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--blanco);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input { 
            padding: 16px; 
            background-color: #000;
            border: 1px solid #333;
            border-radius: 10px;
            color: white;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input:focus {
            border-color: var(--amarillo);
            outline: none;
            box-shadow: 0 0 0 2px rgba(255, 215, 0, 0.1);
        }

        button { 
            padding: 18px; 
            background-color: var(--amarillo); 
            color: #000; 
            font-weight: 700; 
            border: none; 
            border-radius: 10px;
            cursor: pointer;
            font-size: 1.1rem;
            text-transform: uppercase;
            transition: transform 0.2s, background-color 0.3s;
        }

        button:hover {
            background-color: #e6c200;
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        .footer-tag {
            margin-top: 30px;
            font-size: 0.7rem;
            color: #444;
            text-align: center;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <header>
        <div class="brand">
            <span class="brand-name">WANTED</span>
        </div>
        <div class="logo-w">W</div>
    </header>

    <div class="main-container">
        <div class="descripcion">
            Publica tu pedido ahora. Nuestra red de vendedores competirá por ofrecerte el mejor precio del mercado.
        </div>

        <div class="precio-wrapper">
            <span class="precio-label">OFERTA DESTACADA</span>
            <div class="precio-us">
                <span>USD $</span>3,73
            </div>
        </div>

        <form id="orderForm">
            <div class="input-group">
                <label>Nombre o Usuario</label>
                <input type="text" id="nombre" placeholder="Ej: @comprador22" required>
            </div>
            
            <div class="input-group">
                <label>¿Qué buscas comprar?</label>
                <input type="text" id="producto" placeholder="Nombre del producto o repuesto" required>
            </div>

            <div class="input-group">
                <label>Cantidad requerida</label>
                <input type="number" id="cantidad" placeholder="1" required>
            </div>

            <button type="submit" id="submitBtn">Publicar Pedido</button>
        </form>

        <div class="footer-tag">WANTED MARKETPLACE © 2026</div>
    </div>

    <script>
        const SUPABASE_URL = 'https://gtngqwnbyjqqmuzsztnv.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd0bmdxd25ieWpxcW11enN6dG52Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzNjgyMzksImV4cCI6MjA4ODk0NDIzOX0.vSxxHrayzEJG_HwRXcyOCb5vZuDZksrQe6GnAwhYD1w';
        
        const { createClient } = supabase;
        const _supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

        const form = document.getElementById('orderForm');
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerText = 'PROCESANDO...';
            btn.disabled = true;

            const nombre = document.getElementById('nombre').value;
            const producto = document.getElementById('producto').value;
            const cantidad = parseInt(document.getElementById('cantidad').value);

            const { error } = await _supabase
                .from('pedidos')
                .insert([{ nombre, producto, cantidad }]);

            if (error) {
                alert('Error: ' + error.message);
            } else {
                alert('¡PEDIDO PUBLICADO! Los vendedores han sido notificados.');
                form.reset();
            }
            btn.innerText = 'Publicar Pedido';
            btn.disabled = false;
        });
    </script>
</body>
    </html>
