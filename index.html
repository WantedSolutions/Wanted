<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WANTED | Elite Reverse Auction</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --amarillo: #FFD700;
            --negro-puro: #0a0a0a;
            --negro-card: #141414;
            --gris-texto: #8e8e93;
            --blanco: #ffffff;
            --verde-verificado: #00FF88;
            --rojo-status: #ff4444;
            --dorado-glow: rgba(255, 215, 0, 0.2);
        }

        body { 
            background-color: var(--negro-puro); 
            color: var(--blanco); 
            font-family: 'Inter', sans-serif;
            margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }

        header {
            width: 100%; padding: 20px 40px; display: flex; justify-content: space-between;
            align-items: center; border-bottom: 1px solid #222; background: rgba(0,0,0,0.98);
            position: sticky; top: 0; z-index: 1000; box-sizing: border-box;
        }
        .brand { font-size: 1.8rem; font-weight: 900; color: var(--amarillo); letter-spacing: -1.5px; cursor: pointer; }
        .logo-w { background: var(--amarillo); color: #000; font-weight: 900; width: 42px; height: 42px; display: flex; align-items: center; justify-content: center; border-radius: 8px; font-style: italic; box-shadow: 0 0 15px var(--dorado-glow); }

        .container { width: 95%; max-width: 450px; margin-top: 30px; }

        .card { 
            background: var(--negro-card); padding: 30px; border-radius: 24px; 
            border: 1px solid #333; text-align: center; margin-bottom: 20px;
        }

        h2 { font-size: 1.2rem; font-weight: 800; line-height: 1.3; margin-bottom: 20px; }
        h2 span { color: var(--amarillo); }

        input { 
            width: 100%; padding: 18px; margin-bottom: 15px; background: #000; 
            border: 1px solid #333; border-radius: 12px; color: #fff; box-sizing: border-box;
            font-size: 1rem; transition: 0.3s;
        }

        .btn-main { 
            width: 100%; padding: 20px; background: var(--amarillo); color: #000; 
            border: none; border-radius: 12px; font-weight: 900; cursor: pointer; 
            text-transform: uppercase; letter-spacing: 1px;
        }

        /* PEDIDOS CON UBICACIÓN */
        .pedido-item { 
            background: var(--negro-card); border: 1px solid #222; 
            padding: 25px; border-radius: 20px; margin-bottom: 15px; text-align: left;
        }
        .status-badge { font-size: 0.6rem; font-weight: 900; color: var(--verde-verificado); border: 1px solid var(--verde-verificado); padding: 2px 8px; border-radius: 4px; float: right; }
        .prod-name { font-size: 1.3rem; font-weight: 900; color: var(--amarillo); text-transform: uppercase; display: block; }
        .loc-tag { font-size: 0.8rem; color: #fff; margin-top: 5px; display: block; }
        .details { font-size: 0.85rem; color: var(--gris-texto); margin: 10px 0; line-height: 1.5; }

        .btn-offer { 
            width: 100%; background: #fff; color: #000; padding: 15px; 
            border-radius: 10px; font-weight: 900; border: none; cursor: pointer;
            display: flex; justify-content: space-between; align-items: center; margin-top: 10px;
        }

        .legal-link { font-size: 0.7rem; color: var(--gris-texto); cursor: pointer; margin-top: 20px; text-decoration: underline; display: block; text-align: center; }
        .logout-btn { color: var(--rojo-status); font-size: 0.7rem; cursor: pointer; margin-top: 30px; opacity: 0.6; text-align: center; }
    </style>
</head>
<body>

    <header>
        <div class="brand" onclick="toggleAdmin()">WANTED</div>
        <div class="logo-w">W</div>
    </header>

    <div class="container">
        <div id="authSection" class="card">
            <h2 id="authTitle">ACCESO <span>SISTEMA OTP</span></h2>
            <form id="authForm">
                <input type="email" id="email" placeholder="Email" required>
                <input type="password" id="pass" placeholder="Contraseña" required minlength="6">
                <button type="submit" class="btn-main" id="btnAuth">OBTENER CÓDIGO</button>
            </form>
            <p class="legal-link" onclick="toggleMode()">¿Nuevo usuario? Crear cuenta</p>
        </div>

        <div id="mainPanel" style="display: none;">
            <div class="card">
                <h2>Publica lo que buscas y nuestra red <br><span>competirá por el precio.</span></h2>
                <form id="orderForm">
                    <input type="text" id="prod" placeholder="¿Qué estás buscando?" required>
                    <input type="number" id="cant" placeholder="Cantidad" required>
                    <button type="submit" class="btn-main">LANZAR AL MERCADO</button>
                </form>
            </div>

            <div id="feed"></div>
            <p class="logout-btn" onclick="signOut()">CERRAR SESIÓN SEGURA</p>
        </div>

        <div id="adminPanel" style="display:none; padding: 20px; border-top: 1px dashed var(--amarillo);">
            <h3 style="color:var(--amarillo)">ADMIN PANEL</h3>
            <div id="adminList" style="font-size:0.7rem; color:#fff; overflow:auto;"></div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://gtngqwnbyjqqmuzsztnv.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd0bmdxd25ieWpxcW11enN6dG52Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzNjgyMzksImV4cCI6MjA4ODk0NDIzOX0.vSxxHrayzEJG_HwRXcyOCb5vZuDZksrQe6GnAwhYD1w';
        const TELEGRAM_TOKEN = '8639151291:AAH0njnCbBeGhOd90ZFUnPUFLWS1W-t37AE';
        const TELEGRAM_CHAT_ID = '7660494923';

        const { createClient } = supabase;
        const _supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

        async function getUbicacion() {
            try {
                const res = await fetch('https://ipapi.co/json/');
                const data = await res.json();
                return `${data.city}, ${data.region}`;
            } catch (e) { return "Ubicación no disponible"; }
        }

        document.getElementById('authForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('pass').value;
            const { error } = await _supabase.auth.signInWithPassword({ email, password });
            if (error) {
                const { error: signUpErr } = await _supabase.auth.signUp({ email, password });
                if (signUpErr) alert(signUpErr.message); else alert("Código enviado al email.");
            }
        });

        _supabase.auth.onAuthStateChange((event, session) => {
            if (session) {
                document.getElementById('authSection').style.display = 'none';
                document.getElementById('mainPanel').style.display = 'block';
                renderPedidos();
            }
        });

        async function renderPedidos() {
            const { data } = await _supabase.from('pedidos').select('*').order('id', { ascending: false });
            const feed = document.getElementById('feed');
            feed.innerHTML = '';
            data.forEach(p => {
                const idOculto = p.nombre.charAt(0) + "********";
                const card = document.createElement('div');
                card.className = 'pedido-item';
                card.innerHTML = `
                    <span class="status-badge">UBICACIÓN VERIFICADA</span>
                    <span class="prod-name">${p.producto}</span>
                    <span class="loc-tag">📍 ${p.ubicacion || 'Argentina'}</span>
                    <p class="details">Cant: ${p.cantidad} u.<br>ID Comprador: <span style="color:var(--verde-verificado)">${idOculto}</span></p>
                    <button class="btn-offer" onclick="window.location.href='https://www.dlocalgo.com/'">
                        REVELAR CONTACTO <span>$ 3,73 USD</span>
                    </button>
                `;
                feed.appendChild(card);
            });
        }

        document.getElementById('orderForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const { data: { user } } = await _supabase.auth.getUser();
            const prod = document.getElementById('prod').value;
            const cant = document.getElementById('cant').value;
            const ubi = await getUbicacion();
            
            const { error } = await _supabase.from('pedidos').insert([{ 
                nombre: user.email, producto: prod, cantidad: parseInt(cant), ubicacion: ubi 
            }]);
            
            if (!error) {
                const msg = `🚨 WANTED: NUEVO PEDIDO\n📦 Art: ${prod}\n🔢 Cant: ${cant}\n📍 Loc: ${ubi}\n👤 User: ${user.email}`;
                fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage?chat_id=${TELEGRAM_CHAT_ID}&text=${encodeURIComponent(msg)}`);
                document.getElementById('orderForm').reset();
                renderPedidos();
            }
        });

        function signOut() { _supabase.auth.signOut(); location.reload(); }
        let clicks = 0;
        function toggleAdmin() { clicks++; if(clicks>=5) { const p = prompt("Pass:"); if(p==="wanted2026"){ document.getElementById('adminPanel').style.display='block'; loadAdminData(); } } }
        async function loadAdminData() { const { data } = await _supabase.from('pedidos').select('*'); document.getElementById('adminList').innerHTML = `<pre>${JSON.stringify(data, null, 2)}</pre>`; }
    </script>
</body>
                </html>
