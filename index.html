<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WANTED - Catálogo</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { 
            background-color: #000; 
            color: #FFD700; 
            font-family: 'Courier New', Courier, monospace; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            padding: 20px;
            margin: 0;
            text-align: center;
        }

        .wanted {
            font-size: 5.5rem;
            font-weight: 900;
            letter-spacing: 12px;
            margin-top: 10px;
            line-height: 1;
            font-style: italic;
        }

        .descripcion-pagina {
            margin: 20px 0;
            font-size: 1rem;
            border-top: 2px solid #FFD700;
            border-bottom: 2px solid #FFD700;
            padding: 15px 0;
            width: 100%;
            max-width: 450px;
            line-height: 1.4;
            text-transform: uppercase;
        }

        .precio-grande {
            font-size: 4rem;
            font-weight: bold;
            margin: 10px 0;
        }

        form { 
            width: 90%;
            max-width: 350px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 20px;
        }

        input { 
            padding: 12px; 
            background: #000; 
            border: 2px solid #FFD700; 
            color: #FFD700;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 1rem;
            outline: none;
        }

        button { 
            padding: 18px; 
            background-color: #FFD700; 
            color: #000; 
            font-weight: 900; 
            border: none; 
            cursor: pointer;
            font-size: 1.2rem;
            text-transform: uppercase;
        }

        button:hover {
            background-color: #fff;
        }

        ::placeholder { color: rgba(255, 215, 0, 0.5); }
    </style>
</head>
<body>

    <div class="wanted">WANTED</div>

    <div class="descripcion-pagina">
        ESTE ES UN ESPACIO DONDE EL COMPRADOR PUBLICA UN PEDIDO Y LOS VENDEDORES HACEN SUS OFERTAS. ¡ENCUENTRA LO QUE NECESITAS AL MEJOR PRECIO!
    </div>

    <div class="precio-grande">
        $ 3,73
    </div>

    <form id="orderForm">
        <input type="text" id="nombre" placeholder="TU NOMBRE / ALIAS" required>
        <input type="text" id="producto" placeholder="¿QUÉ PRODUCTO BUSCAS?" required>
        <input type="number" id="cantidad" placeholder="CANTIDAD" required>
        <button type="submit" id="submitBtn">ENVIAR PEDIDO</button>
    </form>

    <script>
        const SUPABASE_URL = 'https://gtngqwnbyjqqmuzsztnv.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd0bmdxd25ieWpxcW11enN6dG52Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzNjgyMzksImV4cCI6MjA4ODk0NDIzOX0.vSxxHrayzEJG_HwRXcyOCb5vZuDZksrQe6GnAwhYD1w';
        
        const { createClient } = supabase;
        const _supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

        const form = document.getElementById('orderForm');
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerText = 'PROCESANDO...';
            btn.disabled = true;

            const nombre = document.getElementById('nombre').value;
            const producto = document.getElementById('producto').value;
            const cantidad = parseInt(document.getElementById('cantidad').value);

            const { error } = await _supabase
                .from('pedidos')
                .insert([{ nombre, producto, cantidad }]);

            if (error) {
                alert('ERROR: ' + error.message);
            } else {
                alert('¡PEDIDO RECIBIDO CON ÉXITO!');
                form.reset();
            }
            btn.innerText = 'ENVIAR PEDIDO';
            btn.disabled = false;
        });
    </script>
</body>
        </html>
