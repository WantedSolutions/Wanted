<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WANTED - Ofertas</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { 
            background-color: #000; 
            color: #FFD700; 
            font-family: 'Courier New', Courier, monospace; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            padding: 20px;
            margin: 0;
            text-transform: uppercase;
        }

        /* El estilo de WANTED original */
        .wanted-title {
            font-size: 5rem;
            font-weight: 900;
            letter-spacing: 15px;
            margin: 20px 0;
            line-height: 1;
        }

        /* Sección de Ofertas */
        .ofertas-container {
            width: 100%;
            max-width: 400px;
            margin-bottom: 30px;
        }

        .oferta-item {
            border: 2px solid #FFD700;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(20, 20, 20, 0.8);
        }

        .precio {
            font-size: 1.2rem;
            font-weight: bold;
            color: #fff;
            background: #FFD700;
            color: #000;
            padding: 2px 8px;
        }

        /* Formulario Simple */
        form { 
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        input { 
            padding: 12px; 
            background: #111; 
            border: 1px solid #FFD700; 
            color: #FFD700;
            font-family: 'Courier New', monospace;
        }

        button { 
            padding: 15px; 
            background-color: #FFD700; 
            color: #000; 
            font-weight: bold; 
            border: none; 
            cursor: pointer;
            font-size: 1rem;
        }

        button:hover { background-color: #fff; }
    </style>
</head>
<body>

    <div class="wanted-title">WANTED</div>

    <div class="ofertas-container">
        <div class="oferta-item">
            <span>Bici Rodado 29</span>
            <span class="precio">$ 150.000</span>
        </div>
        <div class="oferta-item">
            <span>Casco Pro</span>
            <span class="precio">$ 25.000</span>
        </div>
        <div class="oferta-item">
            <span>Luces LED</span>
            <span class="precio">$ 8.500</span>
        </div>
    </div>

    <form id="orderForm">
        <input type="text" id="nombre" placeholder="TU NOMBRE" required>
        <input type="text" id="producto" placeholder="PRODUCTO QUE DESEAS" required>
        <input type="number" id="cantidad" placeholder="CANTIDAD" required>
        <button type="submit" id="submitBtn">ENVIAR PEDIDO</button>
    </form>

    <script>
        const SUPABASE_URL = 'https://gtngqwnbyjqqmuzsztnv.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd0bmdxd25ieWpxcW11enN6dG52Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzNjgyMzksImV4cCI6MjA4ODk0NDIzOX0.vSxxHrayzEJG_HwRXcyOCb5vZuDZksrQe6GnAwhYD1w';
        
        const { createClient } = supabase;
        const _supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

        const form = document.getElementById('orderForm');
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerText = 'ENVIANDO...';

            const nombre = document.getElementById('nombre').value;
            const producto = document.getElementById('producto').value;
            const cantidad = parseInt(document.getElementById('cantidad').value);

            const { error } = await _supabase
                .from('pedidos')
                .insert([{ nombre, producto, cantidad }]);

            if (error) {
                alert('Error: ' + error.message);
            } else {
                alert('¡PEDIDO RECIBIDO!');
                form.reset();
            }
            btn.innerText = 'ENVIAR PEDIDO';
        });
    </script>
</body>
    </html>
