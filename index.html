<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wanted - Pedidos</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { 
            background-color: #000; 
            color: #FFD700; 
            font-family: 'Courier New', Courier, monospace; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0;
            text-transform: uppercase;
        }

        .header-wanted {
            font-size: 3rem;
            font-weight: 900;
            letter-spacing: 10px;
            margin-bottom: 5px;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }

        .sub-header {
            font-size: 0.9rem;
            margin-bottom: 30px;
            letter-spacing: 3px;
            border-bottom: 2px solid #FFD700;
            padding-bottom: 5px;
        }

        form { 
            border: 3px solid #FFD700; 
            padding: 25px; 
            width: 85%;
            max-width: 320px;
            background: rgba(20, 20, 20, 0.9);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
        }

        .campo {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-size: 0.7rem;
            margin-bottom: 5px;
        }

        input { 
            width: 100%; 
            padding: 10px; 
            box-sizing: border-box;
            background: #111; 
            border: 1px solid #FFD700; 
            color: #FFD700;
            font-family: 'Courier New', monospace;
            font-size: 1rem;
        }

        button { 
            width: 100%; 
            padding: 15px; 
            background-color: #FFD700; 
            color: #000; 
            font-weight: bold; 
            border: none; 
            cursor: pointer;
            margin-top: 10px;
            font-size: 1rem;
        }

        button:hover {
            background-color: #fff;
        }
    </style>
</head>
<body>

    <div class="header-wanted">WANTED</div>
    <div class="sub-header">Dead or Alive - Pedidos</div>

    <form id="orderForm">
        <div class="campo">
            <label>Nombre del forajido:</label>
            <input type="text" id="nombre" placeholder="Nombre..." required>
        </div>
        <div class="campo">
            <label>Botín (Producto):</label>
            <input type="text" id="producto" placeholder="¿Qué buscas?" required>
        </div>
        <div class="campo">
            <label>Recompensa (Cantidad):</label>
            <input type="number" id="cantidad" placeholder="Cantidad..." required>
        </div>
        <button type="submit" id="submitBtn">REGISTRAR PEDIDO</button>
    </form>

    <script>
        const SUPABASE_URL = 'https://gtngqwnbyjqqmuzsztnv.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd0bmdxd25ieWpxcW11enN6dG52Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzNjgyMzksImV4cCI6MjA4ODk0NDIzOX0.vSxxHrayzEJG_HwRXcyOCb5vZuDZksrQe6GnAwhYD1w';
        
        const { createClient } = supabase;
        const _supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

        const form = document.getElementById('orderForm');
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerText = 'PROCESANDO...';
            btn.disabled = true;

            const nombre = document.getElementById('nombre').value;
            const producto = document.getElementById('producto').value;
            const cantidad = parseInt(document.getElementById('cantidad').value);

            const { error } = await _supabase
                .from('pedidos')
                .insert([{ nombre, producto, cantidad }]);

            if (error) {
                alert('Error: ' + error.message);
            } else {
                alert('¡PEDIDO REGISTRADO EN EL SISTEMA!');
                form.reset();
            }
            btn.innerText = 'REGISTRAR PEDIDO';
            btn.disabled = false;
        });
    </script>
</body>
                </html>
